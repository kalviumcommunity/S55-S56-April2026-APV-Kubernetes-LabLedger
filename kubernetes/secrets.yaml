apiVersion: v1
kind: Secret
metadata:
  name: lab-ledger-secrets
type: Opaque
stringData:
  # ⚠️ IMPORTANT VITE BUILD-TIME CONSTRAINT:
  # Vite statically embeds environment variables during `npm run build`.
  # Deploying these secrets to Kubernetes DOES NOT magically update the frontend runtime.
  # 
  # These secrets are provided here so that:
  # 1. CI/CD pipelines (e.g., Tekton, Argo, Jenkins) can mount them and run the `docker build`.
  # 2. You have a central source of truth for deployment credentials.
  VITE_SUPABASE_URL: "https://your-project-id.supabase.co"
  VITE_SUPABASE_ANON_KEY: "your-anon-key"
