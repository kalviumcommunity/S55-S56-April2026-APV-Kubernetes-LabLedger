apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lab-ledger-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - ledger.example.com
      secretName: lab-ledger-tls
  rules:
    - host: ledger.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lab-ledger-service
                port:
                  number: 80
